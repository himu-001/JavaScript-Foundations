<script>
    // document.querySelector("#orange").addEventListener('click',(e)=>{
    //     document.body.style.backgroundColor="orange";
    // })

    //  document.querySelector("#green").addEventListener('click',(e)=>{
    //     document.body.style.backgroundColor="green";
    // })

    function clickHandler(color){
        // document.body.style.backgroundColor=`${color}`;

        return function(){
            document.body.style.backgroundColor=`${color}`;
        }
    }
    document.getElementById("orange").onclick=clickHandler("orange");
    document.getElementById("green").onclick=clickHandler("green");

    // Lexical Scoping:
    // The returned function can access `color` because it is defined inside
    // `clickHandler()`.

    // Closure:
    // Even after `clickHandler()` finishes, the returned function remembers
    // the value of `color`, allowing each button to keep its own color.
</script>
