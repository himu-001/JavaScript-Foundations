<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM With Himanshu</title>
</head>
<body style="background-color: #212121;color: #ffff;">

</body>
<script>
    const div=document.createElement("div");
    div.className="main";
    div.id=Math.round(Math.random()*10+1);
    div.setAttribute("title","Meow-Title");
    div.style.backgroundColor='orange';
    div.style.padding='10px';
    // div.innerText="Chai aur Code"; uses two round trip
    const myText= document.createTextNode("Chai aur code");
    div.appendChild(myText);
    document.body.appendChild(div);
    console.log(div);
</script>
</html>
